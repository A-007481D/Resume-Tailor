<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-white text-gray-800 antialiased p-8 max-w-4xl mx-auto mt-10">
    <header class="mb-12">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">{{name}}</h1>
        <div class="text-sm text-gray-600 flex flex-col">
            <span>{{email}}</span>
            <span>{{phone}}</span>
            <span>{{location}}</span>
        </div>
    </header>

    <div class="text-base leading-relaxed space-y-4 text-gray-800">
        {{content}}
    </div>
</body>

</html>
